<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - POE2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для галереи (сохраняем общий стиль сайта) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .gallery-item {
            background: #2d2d2d;
            border: 2px solid #444;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: #c8a951;
            box-shadow: 0 10px 20px rgba(200,169,81,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox для увеличения фото */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 3px solid #c8a951;
            border-radius: 10px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .lightbox-close:hover {
            color: #c8a951;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .gallery-item img {
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="main-nav">
            <div class="logo">
                <a href="index.html"><h1>POE2</h1></a>
            </div>
            <button class="burger" id="burgerBtn">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="classes.html" class="nav-link">Classes</a></li>
                <li><a href="skills.html" class="nav-link">Passive Tree</a></li>
                <li><a href="items/index.html" class="nav-link">Items</a></li>
                <li><a href="mtx.html" class="nav-link">MTX</a></li>
                <li><a href="gallery.html" class="nav-link active">Gallery</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="section-content">
            <div class="section-header">
                <h2>Gallery</h2>
                <p>Explore the dark and dangerous world of Wraeclast</p>
            </div>

            <!-- Gallery Grid - 10 фото gallery1.jpg - gallery10.jpg -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Фото будут добавлены через JavaScript -->
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        // Бургер меню
        const burgerBtn = document.getElementById('burgerBtn');
        const navMenu = document.getElementById('navMenu');

        if (burgerBtn && navMenu) {
            burgerBtn.addEventListener('click', function() {
                navMenu.classList.toggle('open');
                burgerBtn.classList.toggle('active');
            });

            document.querySelectorAll('.nav-link').forEach(function(link) {
                link.addEventListener('click', function() {
                    navMenu.classList.remove('open');
                    burgerBtn.classList.remove('active');
                });
            });
        }

        // Генерация 10 фотографий gallery1.jpg - gallery10.jpg
        const galleryGrid = document.getElementById('galleryGrid');
        
        if (galleryGrid) {
            for (let i = 1; i <= 10; i++) {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.innerHTML = `
                    <img src="images/gallery/gallery${i}.jpg" alt="Gallery Image ${i}" onerror="this.src='images/placeholder.jpg'">
                `;
                
                // Добавляем обработчик клика для открытия lightbox
                galleryItem.addEventListener('click', function() {
                    const img = this.querySelector('img');
                    openLightbox(img.src);
                });
                
                galleryGrid.appendChild(galleryItem);
            }
        }

        // Lightbox функции
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function openLightbox(src) {
            if (lightboxImg) lightboxImg.src = src;
            if (lightbox) lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            if (lightbox) lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        if (lightbox) {
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox || e.target.classList.contains('lightbox-close')) {
                    closeLightbox();
                }
            });
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>

</body>
</html>
