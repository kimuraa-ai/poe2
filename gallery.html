<!DOCTYPE html>

    <title>Gallery - POE2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Небольшие дополнения только для сетки галереи */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .gallery-item {
            background: #2d2d2d;
            border: 2px solid #444;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: #c8a951;
            box-shadow: 0 10px 20px rgba(200,169,81,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .gallery-info {
            padding: 1rem;
            text-align: center;
        }

        .gallery-info h4 {
            color: #c8a951;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .gallery-info p {
            color: #aaa;
            font-size: 0.85rem;
        }
    </style>
</head>

    <script>
        // Бургер меню
        const burgerBtn = document.getElementById('burgerBtn');
        const navMenu = document.getElementById('navMenu');

        if (burgerBtn && navMenu) {
            burgerBtn.addEventListener('click', function() {
                navMenu.classList.toggle('open');
                burgerBtn.classList.toggle('active');
            });

            document.querySelectorAll('.nav-link').forEach(function(link) {
                link.addEventListener('click', function() {
                    navMenu.classList.remove('open');
                    burgerBtn.classList.remove('active');
                });
            });
        }

        // Проверяем, есть ли фото в галерее, и скрываем сообщение
        const galleryGrid = document.querySelector('.gallery-grid');
        const noImagesMsg = document.getElementById('noImagesMsg');
        
        if (galleryGrid && noImagesMsg) {
            // Если в сетке есть дочерние элементы (фото), скрываем сообщение
            if (galleryGrid.children.length > 0) {
                noImagesMsg.style.display = 'none';
            }
        }
    </script>
