<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of Exile 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="main-nav">
            <div class="logo">
                <a href="index.html"><h1>POE2</h1></a>
            </div>

            <button class="burger" id="burgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>

       <ul class="nav-menu" id="navMenu">
    <li><a href="index.html"   class="nav-link active">Home</a></li>
    <li><a href="classes.html" class="nav-link">Classes</a></li>
    <li><a href="skills.html"  class="nav-link">Passive Tree</a></li>
    <li><a href="items/index.html" class="nav-link">Items</a></li>
      <li><a href="mtx.html" class="nav-link">MTX</a></li> 
    <li><a href="gallery.html" class="nav-link">Gallery</a></li>
</ul>
        </nav>
    </header>

    

    <script>
        // Бургер меню
        document.getElementById('burgerBtn').addEventListener('click', function() {
            document.getElementById('navMenu').classList.toggle('open');
            document.getElementById('burgerBtn').classList.toggle('active');
        });

        // Закрыть меню при клике на ссылку
        document.querySelectorAll('.nav-link').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('navMenu').classList.remove('open');
                document.getElementById('burgerBtn').classList.remove('active');
            });
        });

        // Активный пункт при скролле
        window.addEventListener('scroll', function() {
            var sections = document.querySelectorAll('section[id], div[id]');
            var links    = document.querySelectorAll('.nav-link');

            sections.forEach(function(section) {
                var top    = section.offsetTop - 100;
                var bottom = top + section.offsetHeight;

                if (window.scrollY >= top && window.scrollY < bottom) {
                    links.forEach(function(l) { l.classList.remove('active'); });
                    var activeLink = document.querySelector('.nav-link[href="#' + section.id + '"]');
                    if (activeLink) activeLink.classList.add('active');
                }
            });
        });
    </script>

</body>
</html>
