<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weapons - POE2</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="item-styles.css">

<style>
.weapon-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.8rem;
    margin-bottom: 2rem;
    padding: 1rem;
    background: #2d2d2d;
    border-radius: 15px;
    border: 2px solid #c8a951;
}
.weapon-nav a {
    color: #f0f0f0;
    text-decoration: none;
    padding: 0.5rem 1.2rem;
    border-radius: 30px;
    font-weight: bold;
}
.weapon-nav a:hover {
    background: #c8a951;
    color: #1a1a1a;
}
</style>
</head>

<body>

<header>
<nav class="main-nav">
    <div class="logo">
        <a href="../index.html"><h1>POE2</h1></a>
    </div>
    <ul class="nav-menu">
        <li><a href="../index.html#home">Home</a></li>
        <li><a href="../index.html#classes">Classes</a></li>
        <li><a href="../index.html#skills">Skills</a></li>
        <li><a href="index.html" class="active">Items</a></li>
    </ul>
</nav>
</header>

<main class="items-page">
<div class="items-container">

<!-- НАВИГАЦИЯ ITEMS -->
<div class="items-nav">
    <a href="index.html">← All Categories</a>
    <a href="currency.html">Currency</a>
    <a href="weapons.html" class="active">Weapons</a>
    <a href="armour.html">Armour</a>
</div>

<h1 class="page-title">Weapons</h1>

<!-- НАВИГАЦИЯ ПО ОРУЖИЮ -->
<div class="weapon-nav">
    <a href="#wands">Wands</a>
    <a href="#staves">Staves</a>
    <a href="#bows">Bows</a>
    <a href="#crossbows">Crossbows</a>
    <a href="#maces">Maces</a>
    <a href="#spears">Spears</a>
</div>

<!-- WANDS -->
<div id="wands" class="category-section">
    <div class="category-header">
        <h3>Wands</h3>
        <p>Grant built-in spells</p>
    </div>
    <div class="items-grid" id="wands-container"></div>
</div>

<!-- STAVES -->
<div id="staves" class="category-section">
    <div class="category-header">
        <h3>Staves</h3>
    </div>
    <div class="items-grid" id="staves-container"></div>
</div>

<!-- BOWS -->
<div id="bows" class="category-section">
    <div class="category-header">
        <h3>Bows</h3>
    </div>
    <div class="items-grid" id="bows-container"></div>
</div>

</div>
</main>

<script>
const data = {
wands: [
{
name:"Withered Wand",
base:1,
skill:"Chaos Bolt",
skillMin:1,
skillMax:20,
lvl:1,
int:[6,80],
img:"images/weapons/withered-wand.png"
},
{
name:"Bone Wand",
base:2,
skill:"Bone Blast",
skillMin:1,
skillMax:20,
lvl:2,
int:[7,90],
img:"images/weapons/bone-wand.png"
},
{
name:"Siphoning Wand",
base:11,
skill:"Power Siphon",
skillMin:4,
skillMax:20,
lvl:11,
int:[23,120],
img:"images/weapons/siphoning-wand.png"
}
],

staves: [
{
name:"Basic Staff",
base:1,
skill:"Spell",
skillMin:1,
skillMax:20,
lvl:1,
int:[10,80],
img:"images/weapons/staff.png"
}
],

bows: [
{
name:"Crude Bow",
base:1,
skill:"Bow Attack",
skillMin:1,
skillMax:20,
lvl:1,
int:[0,0],
img:"images/weapons/bow.png"
}
]
};

function card(w){
return `
<div class="item-card">
    <div class="item-icon"><img src="${w.img}"></div>
    <div class="item-info">
        <h4>${w.name}</h4>
        <div class="item-type">Base Level: ${w.base}</div>

        <p class="item-description">
        Skill: ${w.skill} (${w.skillMin}-${w.skillMax})<br>
        Level: ${w.lvl}<br>
        INT: ${w.int[0]} - ${w.int[1]}
        </p>
    </div>
</div>
`;
}

function render(type, id){
document.getElementById(id).innerHTML =
data[type].map(card).join("");
}

render("wands","wands-container");
render("staves","staves-container");
render("bows","bows-container");
</script>

</body>
</html>
